name: Deploy to Dokku

on:
  push:
    branches:
      - master

env:
  IMAGE: ghcr.io/a-u-supply/a-u.supply

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts
          printf 'Host dokku\n  HostName 204.168.201.89\n  User dokku\n  IdentityFile ~/.ssh/id_ed25519\n' >> ~/.ssh/config

      - name: Authenticate Dokku with GHCR
        run: ssh dokku registry:login au-supply ghcr.io ${{ github.actor }} ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy pre-built image to Dokku
        run: |
          ssh dokku git:from-image au-supply ${{ env.IMAGE }}:${{ github.sha }}
          ssh dokku ps:restart au-supply
          sleep 5
          ssh dokku proxy:build-config au-supply

      - name: Verify site is up
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://a-u.supply/ || echo "000")
            if [ "$code" = "200" ]; then echo "Site is up"; exit 0; fi
            echo "Attempt $i: got $code, waiting..."
            sleep 5
          done
          echo "Site still not responding, forcing restart..."
          ssh dokku ps:restart au-supply
          sleep 10
          ssh dokku proxy:build-config au-supply
