name: Seed catalog from Archive.org

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts

      - name: Run seed script
        run: |
          ssh dokku@204.168.201.89 run au-supply .venv/bin/python seed_catalog.py
