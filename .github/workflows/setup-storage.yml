name: Setup persistent storage and seed

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts

      - name: Mount persistent storage
        run: |
          ssh dokku@204.168.201.89 storage:ensure-directory au-supply
          ssh dokku@204.168.201.89 storage:mount au-supply /var/lib/dokku/data/storage/au-supply:/app/data || true
          ssh dokku@204.168.201.89 storage:list au-supply

      - name: Restart app with storage
        run: |
          ssh dokku@204.168.201.89 ps:restart au-supply

      - name: Run seed script
        run: |
          sleep 10
          ssh -o ServerAliveInterval=30 dokku@204.168.201.89 enter au-supply web .venv/bin/python seed_catalog.py
