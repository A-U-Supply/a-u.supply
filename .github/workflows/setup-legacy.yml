name: Setup legacy site

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts

      - name: Clone legacy repo into storage
        run: |
          ssh dokku@204.168.201.89 run au-supply git clone https://github.com/A-U-Supply/ausupply.github.io.git /srv/legacy-site
