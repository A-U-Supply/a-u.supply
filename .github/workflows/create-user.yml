name: Create admin user

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email'
        required: true
      name:
        description: 'User display name'
        required: true
      password:
        description: 'Initial password'
        required: true
      role:
        description: 'Role (admin or member)'
        required: true
        default: 'member'

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts

      - name: Create user
        run: |
          ssh dokku@204.168.201.89 run au-supply .venv/bin/python cli.py create-user \
            --email '${{ github.event.inputs.email }}' \
            --name '${{ github.event.inputs.name }}' \
            --password '${{ github.event.inputs.password }}' \
            --role '${{ github.event.inputs.role }}'
