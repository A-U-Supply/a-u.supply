name: Create admin user

on:
  workflow_dispatch:

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts

      - name: Reset DB schema
        run: ssh dokku@204.168.201.89 run au-supply .venv/bin/python reset_db.py

      - name: Create admin user
        run: ssh dokku@204.168.201.89 run au-supply .venv/bin/python cli.py create-user --email oyouareatubeo@gmail.com --name tube --password changeme123 --role admin
