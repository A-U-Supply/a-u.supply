name: Create admin user

on:
  workflow_dispatch:

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.201.89 >> ~/.ssh/known_hosts

      - name: Reset users table and create admin
        run: |
          ssh dokku@204.168.201.89 run au-supply .venv/bin/python -c "
          from models import Base, engine
          from sqlalchemy import text
          with engine.connect() as c:
              c.execute(text('DROP TABLE IF EXISTS users'))
              c.commit()
          Base.metadata.create_all(bind=engine)
          print('Table recreated')
          "
          ssh dokku@204.168.201.89 run au-supply .venv/bin/python cli.py create-user --email REDACTED@example.com --name tube --password REDACTED --role admin
