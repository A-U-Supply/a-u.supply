name = "sparagmos"
display_name = "Sparagmos — Image Destruction"
description = "Feed images through destruction recipes: glitch, decay, neural hallucination, geometric compositing. 150 recipes, 2-5 input images."
image = "ghcr.io/a-u-supply/sparagmos:latest"
timeout_seconds = 900
input_mode = "flag"
input_flag = "--input"
output_flag = "--output /work/output/output.png"

[env]
pass_through = ["HF_TOKEN"]

[output]
index = "sparagmos-outputs"

[input]
min_items = 2
max_items = 5
media_types = ["image"]
allow_random_fill = true

[command_map]
param = "processing_mode"
[command_map.values]
recipe = ""
random = ""
chain = ""

# --- Processing Mode ---
[params.processing_mode]
type = "select"
label = "Mode"
description = "Choose a specific recipe, let sparagmos pick randomly, or chain multiple recipes."
options = ["recipe", "random", "chain"]
default = "recipe"
required = true
no_flag = true

# --- Recipe Selection ---
[params.recipe]
type = "select"
label = "Recipe"
description = "Each recipe defines a chain of destruction effects. Input count shown per group."
required = true
flag = "--recipe"
depends_on = { param = "processing_mode", value = "recipe" }

