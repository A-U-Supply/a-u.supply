name = "rottengenizdat"
display_name = "RGZ-9 Latent Space Press"
description = "Feed audio through RAVE neural networks. Latent space distortion from subtle to fever-dream."
image = "ghcr.io/a-u-supply/rottengenizdat:latest"
command = "rotten rave"
timeout_seconds = 600

[input]
min_items = 1
max_items = 10
media_types = ["audio"]
allow_random_fill = true

[params.model]
type = "select"
label = "RAVE Model"
description = "Neural network trained on a specific audio domain."
options = ["percussion", "vintage", "nasa", "vctk", "orchestral", "instrumental", "strings"]
default = "vintage"
required = true

[params.temperature]
type = "float"
label = "Temperature"
description = "0.3 = smooth, 1.0 = identity, 2.0+ = destruction"
min = 0.1
max = 3.0
default = 1.0

[params.noise]
type = "float"
label = "Noise Injection"
description = "Amount of noise injected into the latent space. 0.0 = none, 1.0 = full."
min = 0.0
max = 1.0
default = 0.0

[params.mix]
type = "float"
label = "Wet/Dry Mix"
description = "Blend between original (0.0) and processed (1.0) audio."
min = 0.0
max = 1.0
default = 1.0

[params.reverse]
type = "bool"
label = "Reverse"
description = "Flip the temporal axis in latent space."
default = false

[params.shuffle]
type = "float"
label = "Shuffle"
description = "Timeline fragmentation amount. 0.0 = none."
min = 0.0
max = 1.0
default = 0.0

[params.quantize]
type = "float"
label = "Quantize"
description = "Discretize continuous latent values. 0.0 = none."
min = 0.0
max = 1.0
default = 0.0
