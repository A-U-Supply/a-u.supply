# --- Single pass params (visible when mode = single_pass) ---

[params.model]
type = "select"
label = "RAVE Model"
description = "Neural network trained on a specific audio domain. The model determines the timbral character imprinted on your audio. 'vintage' adds warm analog color, 'percussion' emphasizes rhythmic transients, 'nasa' introduces alien transmission artifacts, 'VCTK' makes everything sound like speech, 'musicnet' blends classical instrument timbres, 'isis' adds Middle Eastern string resonance, 'sol_ordinario/sol_full' impart bowed-string character, 'darbouka_onnx' adds hand-drum patterns."
options = ["percussion", "vintage", "nasa", "VCTK", "musicnet", "isis", "sol_ordinario", "sol_full", "darbouka_onnx"]
default = "vintage"
required = true
flag = "-m"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.temperature]
type = "float"
label = "Temperature"
description = "Controls how far the latent representation drifts from the original encoding. At 0.3 the output is smoothed and softened. At 1.0 it's a faithful reconstruction through the model's lens. Above 1.5 the latent space starts hallucinating. At 2.0+ expect heavy distortion and artifacts."
min = 0.1
max = 3.0
default = 1.0
flag = "-t"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.noise]
type = "float"
label = "Noise Injection"
description = "Injects random noise into the latent space before decoding. At 0.0 the signal passes through cleanly. Small values (0.1-0.3) add texture and grain. Higher values progressively dissolve the original signal into the model's learned noise floor."
min = 0.0
max = 1.0
default = 0.0
flag = "-n"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.mix]
type = "float"
label = "Wet/Dry Mix"
description = "Blends between your original audio (0.0) and the RAVE-processed output (1.0). Use values like 0.3-0.5 to keep your original recognizable with neural coloring on top. At 1.0 you hear only the processed result."
min = 0.0
max = 1.0
default = 1.0
flag = "-w"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.dims]
type = "string"
label = "Latent Dimensions"
description = "Comma-separated list of latent dimensions to manipulate (e.g. '0,1,2,3'). Unselected dimensions keep their original values, letting the model's character bleed through only on specific axes. Leave empty to manipulate all dimensions."
default = ""
flag = "-d"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.reverse]
type = "bool"
label = "Reverse"
description = "Flips the temporal axis in latent space before decoding. The audio plays forward but the latent trajectory runs backward, creating an uncanny reversal effect that sounds different from simply reversing the waveform."
default = false
flag = "-r"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.shuffle]
type = "float"
label = "Shuffle"
description = "Fragments the latent timeline into chunks and reorders them randomly. The value sets the chunk size in frames. 0 = disabled. 4-8 = mild fragmentation (subtle glitchiness). 2-3 = heavy fragmentation (granular chaos). Higher values = longer chunks = more coherent segments in random order."
min = 0.0
max = 32.0
default = 0.0
flag = "--shuffle"
depends_on = { param = "processing_mode", value = "single_pass" }

[params.quantize]
type = "float"
label = "Quantize"
description = "Snaps continuous latent values to a discrete grid, like bit-crushing but in latent space. 0.0 = off. 0.1 = subtle stepping artifacts. 0.5 = audibly crunchy, reduced detail. 1.0 = extreme — the latent space collapses to a handful of values."
min = 0.0
max = 1.0
default = 0.0
flag = "-q"
depends_on = { param = "processing_mode", value = "single_pass" }

# --- Multi-input options (both modes, only relevant with 2+ inputs) ---

[params.input_combination]
type = "select"
label = "Input Combination"
description = "How multiple input files are combined before processing. Splice chops all inputs into segments and shuffles them together (collage). Concat joins them end-to-end. Blend processes each file separately then mixes the outputs together. Independent processes each file separately with one output per input. Only matters with 2+ inputs — single inputs are passed through directly."
options = ["splice", "concat", "blend", "independent"]
default = "splice"
flag = "--mode"

[params.splice_min]
type = "float"
label = "Splice Min (seconds)"
description = "Minimum duration of each spliced segment in seconds. Shorter = choppier, more granular collage. Only used in splice mode."
min = 0.01
max = 30.0
default = 0.25
flag = "--splice-min"
depends_on = { param = "input_combination", value = "splice" }

[params.splice_max]
type = "float"
label = "Splice Max (seconds)"
description = "Maximum duration of each spliced segment in seconds. Longer = more coherent phrases between cuts. Only used in splice mode."
min = 0.01
max = 60.0
default = 4.0
flag = "--splice-max"
depends_on = { param = "input_combination", value = "splice" }
