name = "rottengenizdat"
display_name = "RGZ-9 Latent Space Press"
description = "Feed audio through RAVE neural networks. Single-pass processing or multi-step recipe chains."
long_description = """Audio processing through RAVE variational autoencoders. Your audio is encoded into a latent space, manipulated, then decoded back.

In Single Pass mode, you control every parameter directly — pick a model, set the temperature, inject noise, shuffle the timeline. Each model was trained on a different audio domain (vintage vinyl, NASA transmissions, vocal datasets, percussion) and imprints its learned character onto your input.

In Recipe mode, you choose from 41 pre-built multi-step chains. Recipes define sequences of RAVE passes with curated parameter curves — applied either in series (sequential: each step feeds the next) or in parallel (branch: multiple paths mixed by weight). They range from barely-perceptible enhancement to total signal destruction.

When processing multiple inputs, choose how they're combined: splice (chop and shuffle segments together), concat (join end-to-end), or independent (process each file separately)."""
image = "ghcr.io/a-u-supply/rottengenizdat:latest"
command = "rave"
timeout_seconds = 900

# How input files are passed to the command
input_mode = "positional"

# Static flags always appended to the command
output_flag = "-o /work/output/output.wav"

# Dynamic command: override based on processing_mode param
[command_map]
param = "processing_mode"
[command_map.values]
single_pass = "rave"
recipe = "recipe run"

[output]
index = "rgz9-outputs"

[input]
min_items = 1
max_items = 10
media_types = ["audio", "video"]
allow_random_fill = true

# --- Processing mode ---

[params.processing_mode]
type = "select"
label = "Processing Mode"
description = "Single Pass gives you direct control over every parameter. Recipe runs a pre-built multi-step chain."
options = ["single_pass", "recipe"]
default = "single_pass"
required = true
no_flag = true

# --- Recipe params (visible when mode = recipe) ---

[params.recipe]
type = "select"
label = "Recipe"
description = "Multi-step processing chain to apply. Each recipe defines a sequence of RAVE passes with specific models, temperatures, and effects."
required = true
position = 1
value_template = "/app/recipes/{}.toml"
depends_on = { param = "processing_mode", value = "recipe" }

