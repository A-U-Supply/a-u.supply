name = "rottengenizdat-recipes"
display_name = "RGZ-9 Recipe Chains"
description = "Multi-step audio processing chains through RAVE neural networks."
long_description = """Recipes are pre-built multi-step processing chains. Each one defines a precise sequence of RAVE passes — model selection, temperature curves, noise injection, latent-space reversals, and wet/dry mixing — applied either in series (sequential) or in parallel (branch).

Sequential recipes feed each step's output into the next, like an effects chain. Branch recipes process the original audio through multiple paths simultaneously and mix the results by weight.

Recipes range from barely-perceptible enhancement to total signal destruction. For manual single-pass control over individual parameters, use "RGZ-9 Latent Space Press" instead."""
image = "ghcr.io/a-u-supply/rottengenizdat:latest"
command = "recipe run"
timeout_seconds = 900
input_mode = "positional"
output_flag = "-o /work/output/output.wav"

[input]
min_items = 1
max_items = 10
media_types = ["audio", "video"]
allow_random_fill = true

[params.recipe]
type = "select"
label = "Recipe"
description = "Processing chain to apply to your audio."
required = true
position = 1
value_template = "/app/recipes/{}.toml"

